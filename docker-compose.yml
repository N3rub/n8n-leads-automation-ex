#
# EXTENSION FIELDS — Configuración compartida n8n-main y n8n-worker
#
x-n8n-common: &n8n-common
  image: n8nio/n8n:latest #1.44.1
  user: "1000:1000"
  restart: unless-stopped
  env_file:
    - .env.n8n
  volumes:
    - n8n_data:/home/node/.n8n
    - ./dist/custom-nodes:/home/node/.n8n/custom:ro   # Compilado por CI/CD — gitignored
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
  security_opt:
    - no-new-privileges:true
#  cap_drop:
#    - ALL
#  cap_add:
#    - CHOWN
#    - SETUID
#    - SETGID
  tmpfs:
    - /tmp:mode=1777,size=64m
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  #
  # Nginx
  #
  nginx:
    image: nginx:stable-alpine3.23-perl
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
    depends_on:
      n8n-main:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true


  #
  # N8N MAIN — UI, webhooks y coordinación de cola
  #
  n8n-main:
    <<: *n8n-common
    container_name: n8n-main
    hostname: n8n-main
    ports:
      - "127.0.0.1:5678:5678"
    networks:
      - frontend-net
      - backend-net
      - db-net
      - monitoring-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  #
  # N8N WORKER — Ejecuta workflows (escala horizontalmente)
  #
  n8n-worker:
    <<: *n8n-common
    container_name: n8n-worker
    hostname: n8n-worker
    command: ["worker", "--concurrency=5"]
    networks:
      - frontend-net
      - backend-net
      - db-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  #
  # POSTGRESQL — Servidor con dos bases de datos:
  #   · n8n_db   → motor interno de n8n
  #   · leads_db → datos de negocio (leads, eventos, error log)
  #
  postgres:
    image: postgres:17.5-alpine3.22 #16.3-alpine
    container_name: postgres
    user: "70:70"
    restart: unless-stopped
    env_file:
      - .env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - db-net
    security_opt:
      - no-new-privileges:true
#    cap_drop:
# ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    read_only: true
    tmpfs:
      - /tmp
      - /run/postgresql:uid=70,gid=70
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  #
  # REDIS — Cola Bull (n8n) + caché de deduplicación de leads
  #
  redis:
    image: redis:latest #7.2-alpine
    container_name: redis
    user: "999:999"
    restart: unless-stopped
    env_file:
      - .env.redis
    command:
      - 'redis-server'
      - '--requirepass ${REDIS_PASSWORD}'
      - '--save ""'
      - '--maxmemory-policy allkeys-lru'
      - '--maxmemory 256mb'
      - '--appendonly no'
      - '--protected-mode yes'
      - '--loglevel warning'
      - '--rename-command FLUSHDB ""'
      - '--rename-command FLUSHALL ""'
      - '--rename-command DEBUG ""'
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    security_opt:
      - no-new-privileges:true
#    cap_drop:
#      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  #
  # RABBITMQ — Broker de mensajes para el pipeline de leads
  #
  rabbitmq:
    image: rabbitmq:management #3.13.3-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq-lead-broker
    restart: unless-stopped
    env_file:
      - .env.rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/entrypoint-init.sh:/entrypoint-init.sh:ro
#      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    entrypoint: ["/bin/sh", "/entrypoint-init.sh"]
    networks:
      - backend-net
      - monitoring-net
    security_opt:
      - no-new-privileges:true
#    cap_drop:
#      - ALL
#    cap_add:
#      - SETUID
#      - SETGID
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  #
  # PROMETHEUS — Recolección de métricas
  #
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    user: "65534:65534"
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
#    cap_drop:
#      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:9090:9090"

#
# MOCK ENRICHMENT (Mockoon CLI)
# Simula la API de HubSpot. HUBSPOT_API_BASE_URL apunta aquí.
#

  mock-enrichment:
    image: mockoon/cli:latest
    container_name: mock-crm
    restart: unless-stopped
    networks:
      - backend-net
    ports:
      - "3001:3001"
    volumes:
      - ./mockoon/enrichment-mock.json:/data/mock.json:ro
    command: ["--data", "/data/mock.json", "--port", "3001", "--log-transaction"]


  #
  # GRAFANA — Dashboards de observabilidad
  #
  grafana:
    image: grafana/grafana:13.0.0-23336907879
    container_name: grafana
    user: "472:472"
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - db-net
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:3000:3000"

#
# NETWORKS — Segmentación por función
#
networks:
  frontend-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24

  db-net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24

  monitoring-net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.3.0/24

#
# VOLUMES
#
volumes:
  n8n_data:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    project:     'aicor-leads'

rule_files:
  - '/etc/prometheus/alerts/*.yml'

scrape_configs:

  - job_name: 'n8n'
    static_configs:
      - targets: ['n8n-main:5678']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

events {
    worker_connections 1024;
}

http {

    # --- Zonas de rate limiting ---
    # 10MB para almacenar IPs (~160.000 IPs)
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m  rate=100r/s;

    # Respuesta personalizada para 429
    limit_req_status 429;

    server {
        listen 80;
        server_name _;
        # Redirigir todo a HTTPS en producción

        # Solo en producción — test sin límite
        location /webhook-test {
            proxy_pass http://n8n-main:5678;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Producción con rate limit
        location /webhook {
            limit_req zone=webhook_limit burst=20 nodelay;
            proxy_pass http://n8n-main:5678;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # --- Resto de n8n (UI, otros webhooks) ---
        location / {
            limit_req zone=global_limit burst=120 nodelay;

            proxy_pass         http://n8n-main:5678;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Respuesta custom para rate limit ---
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"status":"error","errors":["Too many requests. Max 10 requests per minute per IP."]}';
        }
    }
}
